<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta information for character encoding and viewport settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title displayed in browser tab -->
    <title>Petrol Calculator</title>
    <!-- Link to external CSS stylesheet for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main container for the petrol calculator application -->
    <div class="container">
        <!-- Header section with title -->
        <header>
            <h1>⛽ Petrol Calculator</h1>
            <!-- Subtitle describing the purpose of the application -->
            <p class="subtitle">Calculate the total cost of your petrol purchase</p>
        </header>

        <!-- Main content section containing the calculator form -->
        <main>
            <!-- Form section for input fields -->
            <form id="petrolForm">
                <!-- First input field: Cost per liter -->
                <div class="form-group">
                    <!-- Label for the cost per liter input field -->
                    <label for="costPerLiter">Cost per Liter (£):</label>
                    <!-- Input field for entering the cost of petrol per liter with default value of 1.72 -->
                    <input 
                        type="number" 
                        id="costPerLiter" 
                        name="costPerLiter" 
                        min="0" 
                        step="0.01" 
                        value="1.72"
                        placeholder="Enter cost per liter"
                    >
                </div>

                <!-- Second input field: Number of liters purchased -->
                <div class="form-group">
                    <!-- Label for the liters purchased input field -->
                    <label for="litersPurchased">Liters Purchased:</label>
                    <!-- Input field for entering the number of liters with default value of 0 -->
                    <input 
                        type="number" 
                        id="litersPurchased" 
                        name="litersPurchased" 
                        min="0" 
                        step="0.01" 
                        value="0"
                        placeholder="Enter number of liters"
                    >
                </div>

                <!-- Button section -->
                <div class="button-container">
                    <!-- Calculate button that triggers the calculation when clicked -->
                    <button type="button" id="calculateBtn" class="calculate-btn">Calculate Total Cost</button>
                </div>
            </form>

            <!-- Result section displaying the calculated total cost -->
            <div class="result-container">
                <!-- Paragraph tag to display the total cost result -->
                <!-- Initially empty, will be populated by JavaScript after calculation -->
                <p id="totalCostResult" class="result-text"></p>
            </div>
        </main>

        <!-- Footer section for additional information -->
        <footer>
            <p>&copy; 2026 Petrol Calculator. All rights reserved.</p>
        </footer>
    </div>

    <!-- Link to external JavaScript file for functionality -->
    <script src="index.js"></script>
</body>
</html>
